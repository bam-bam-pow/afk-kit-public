version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.react-vite
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    command: npm run dev -- --host 0.0.0.0
